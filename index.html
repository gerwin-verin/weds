    <style>
      .square {
        height: 50px;
        width: 50px;
        background-color: #555;
      }
    </style>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .fade-in {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1s ease-out, transform 1s ease-out;
      }
      .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 1.2s ease-out forwards;
      }
      .delay-1s {
        animation-delay: 1.5s;
      }

      .carousel-item {
        transition: opacity-1.5s ease-in-out;
      }
      .gold-border {
        border: 1px solid rgba(115, 92, 0, 0.2);
      }
      .botanical-divider {
        width: 100%;
        height: 60px;
        mask-image: url("https://www.svgrepo.com/show/435165/divider-ornamental.svg");
        mask-repeat: no-repeat;
        mask-position: center;
        background-color: #735c00;
        opacity: 0.2;
      }

      .video-container {
        position: relative;
        width: 100%;
        height: 100vh; /* Takes up the full viewport height */
        overflow: hidden;
      }

      #full-video {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        object-fit: cover; /* Ensures the video covers the section without distorting */
        transform: translate(-50%, -50%);
        z-index: -1;
      }

      /* Pastikan section utama memiliki posisi relatif jika dibutuhkan */
      .container-section {
        /* width: 100%; */
        /* max-width: 100%; */
        /* margin: 0 auto; */

        position: relative;
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        overflow: hidden;
      }

      /* 1. Kontainer pembungkus yang menentukan ukuran 'fullscreen' di dalam section */
      .iframe-wrapper {
        position: relative;
        width: 100%;
        /* Anda bisa menentukan tinggi absolut atau menggunakan aspek rasio */
        height: 800px;
        background-color: #000; /* Warna latar belakang sebelum iframe termuat */
        border: 1px solid #ccc;
        overflow: hidden;
      }

      /* 2. Memaksa iframe memenuhi 100% ruang pembungkusnya */
      .iframe-wrapper video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        transform: scale(1.15);
        transform-origin: center center;
        z-index: 1;
      }

      .iframe-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5); /* Hitam transparan 50% */
        z-index: 2; /* Di atas iframe, di bawah teks */
        pointer-events: none; /* PENTING: Klik mouse akan "menembus" lapisan ini ke video */
      }

      .iframe-text {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 3; /* Lapisan teratas, di depan iframe */

        /* Mengatur teks tepat di tengah secara vertikal & horizontal */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        pointer-events: none; /* PENTING: Agar user tetap bisa klik tombol Play/Pause pada video */
      }

      #gif-scroll-down {
        margin-top: 20px;
        display: flex;
        justify-content: center; /* Centers horizontally */
        align-items: center;
        text-align: center;
      }
    </style>
